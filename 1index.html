<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Team Sportservice Routes</title>

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <style>
        body{
            margin:0;
            font-family:Arial, Helvetica, sans-serif;
        }

        h1{
            text-align:center;
            padding:20px;
        }

        #map{
            height:80vh;
        }
    </style>

</head>
<body>

<h1>Team Sportservice Routekaart</h1>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([52.956,4.760],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© OpenStreetMap'
}).addTo(map);

</script>

</body>
</html>
